services:
  backend:
    image: ghcr.io/suxrobgm/depvault/backend:latest
    ports:
      - "127.0.0.1:${BACKEND_PORT:-4000}:4000"
    env_file: .env
    environment:
      - PORT=4000
      - NODE_ENV=production
    volumes:
      - backend-uploads:/app/apps/backend/uploads
    restart: unless-stopped

  frontend:
    image: ghcr.io/suxrobgm/depvault/frontend:latest
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-4001}:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  docs:
    image: ghcr.io/suxrobgm/depvault/docs:latest
    ports:
      - "127.0.0.1:${DOCS_PORT:-4002}:4002"
    environment:
      - NODE_ENV=production
      - PORT=4002
      - HOSTNAME=0.0.0.0
    restart: unless-stopped

volumes:
  backend-uploads:
