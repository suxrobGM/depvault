# DepVault Nginx Configuration
#
# Setup:
#   1. Copy this file: sudo cp nginx.conf /etc/nginx/sites-available/depvault.conf
#   2. Symlink: sudo ln -s /etc/nginx/sites-available/depvault.conf /etc/nginx/sites-enabled/
#   3. Test config: sudo nginx -t
#   4. Reload: sudo systemctl reload nginx
#
# SSL with Certbot (run after nginx is configured):
#   sudo apt install certbot
#   sudo certbot --nginx -d depvault.com -d depvault.suxrobgm.net -d get.depvault.com
#   sudo certbot renew --dry-run   # verify auto-renewal

# Rate limiting for auth endpoints
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

# API backend
upstream depvault_backend {
    server 127.0.0.1:4000;
}

# Frontend
upstream depvault_frontend {
    server 127.0.0.1:4001;
}

# Docs
upstream depvault_docs {
    server 127.0.0.1:4002;
}

# 301 redirect: old domain → new domain
server {
    listen 80;
    server_name depvault.suxrobgm.net;
    return 301 https://depvault.com$request_uri;
}

# CLI installer: auto-detect OS from User-Agent
# PowerShell (irm) sends "WindowsPowerShell/" or "PowerShell/" in User-Agent
# curl on Linux/macOS sends "curl/" — everything else defaults to bash script
map $http_user_agent $depvault_install_script {
    default     https://raw.githubusercontent.com/suxrobGM/depvault/main/apps/cli/install.sh;
    ~*PowerShell https://raw.githubusercontent.com/suxrobGM/depvault/main/apps/cli/install.ps1;
}

# CLI installer shortcut: get.depvault.com
# All platforms: same URL, auto-detects OS
#   Linux/macOS: curl -fsSL https://get.depvault.com | bash
#   Windows:     irm https://get.depvault.com | iex
server {
    listen 80;
    server_name get.depvault.com;

    location = / {
        return 301 $depvault_install_script;
    }

    # Explicit overrides for direct linking
    location = /sh {
        return 301 https://raw.githubusercontent.com/suxrobGM/depvault/main/apps/cli/install.sh;
    }

    location = /ps1 {
        return 301 https://raw.githubusercontent.com/suxrobGM/depvault/main/apps/cli/install.ps1;
    }
}

server {
    listen 80;
    server_name depvault.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    client_max_body_size 50M;

    # API — /api/* proxied to backend
    location ~ ^/api/auth/(login|register|reset-password) {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://depvault_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://depvault_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for file uploads
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Health check
    location = /health {
        proxy_pass http://depvault_backend;
        access_log off;
    }

    # Next.js static assets
    location /_next/static {
        proxy_pass http://depvault_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Docs — /docs proxied to docs app
    location /docs {
        proxy_pass http://depvault_docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend — everything else
    location / {
        proxy_pass http://depvault_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
