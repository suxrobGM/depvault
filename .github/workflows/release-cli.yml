name: Release CLI

on:
  push:
    tags:
      - "cli/v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Generate API client
        run: dotnet kiota generate -l CSharp -d apps/cli/openapi.json -o apps/cli/ApiClient -n DepVault.Cli.ApiClient --exclude-backward-compatible

      - name: Publish AOT
        run: dotnet publish -c Release -r ${{ matrix.rid }} -o publish/
        working-directory: apps/cli

      - name: Archive binary (Unix)
        if: runner.os != 'Windows'
        run: tar -czf depvault-${{ matrix.rid }}.tar.gz -C apps/cli/publish depvault

      - name: Archive binary (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path apps/cli/publish/depvault.exe -DestinationPath depvault-${{ matrix.rid }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: depvault-${{ matrix.rid }}
          path: depvault-${{ matrix.rid }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Extract changelog section
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#cli/v}"
          awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]") { found = 1; next }
            }
            found { print }
          ' apps/cli/CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog entry found for version $version" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: depvault-*/*
          body_path: release-notes.md
